name: Java CI/CD with Docker

on:
  push:
    branches: ["main"] # 배포를 트리거할 브랜치
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Create Security Properties
        run: |
          mkdir -p ./src/main/resources
          cat <<EOF > ./src/main/resources/security.properties
          ${{ secrets.SECURITY_PROPERTIES }}
          EOF

      # 1. Gradle 빌드 (테스트 제외)
      - name: Build with Gradle
        run: chmod +x gradlew && ./gradlew bootWar -x test

      # 2. Docker Hub 로그인
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 3. Docker 이미지 빌드 및 푸시
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          no-cache: true # 과거 코드가 남지 않게 강제 재빌드
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/lb-api:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/lb-api:${{ github.run_number }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      # /home/hak/docker-compose.yml 파일을 서버에 미리 복사
      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_KEY }}
          script: |
            # Docker가 설치되어 있는지 확인하고 없으면 설치
            if ! [ -x "$(command -v docker)" ]; then
              echo "Installing Docker..."
              curl -fsSL https://get.docker.com -o get-docker.sh
              sudo sh get-docker.sh
              sudo usermod -aG docker $USER
            fi

            # 2. 최신 이미지 가져오기
            docker compose pull

            # 3. 새 컨테이너 실행 (볼륨 설정은 docker-compose.yml에 이미 포함됨)
            docker compose up -d
                        
            docker image prune -f
